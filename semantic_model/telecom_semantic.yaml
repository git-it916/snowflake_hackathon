    verified_by: data_team

  - name: regional_product_mix
    question: 지역별로 어떤 상품이 인기있어?
    sql: >
      SELECT INSTALL_STATE, MAIN_CATEGORY_NAME,
             SUM(CONTRACT_COUNT) AS total_contracts,
             AVG(AVG_NET_SALES) AS avg_sales
      FROM TELECOM_DB.STAGING.STG_REGIONAL
      GROUP BY INSTALL_STATE, MAIN_CATEGORY_NAME
